<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You're Offline - OneShot</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #05050a;
        color: #f0e8d4;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .icon {
        font-size: 64px;
        margin-bottom: 24px;
        opacity: 0.8;
      }
      h1 {
        font-size: 28px;
        font-weight: 700;
        color: #c8923a;
        margin-bottom: 12px;
        letter-spacing: -0.02em;
      }
      p {
        font-size: 16px;
        color: rgba(240, 232, 212, 0.6);
        line-height: 1.6;
        max-width: 320px;
        margin-bottom: 32px;
      }
      .tip {
        font-size: 13px;
        color: rgba(240, 232, 212, 0.35);
        border: 1px solid rgba(200, 146, 58, 0.2);
        border-radius: 10px;
        padding: 14px 20px;
        max-width: 320px;
        line-height: 1.6;
        margin-bottom: 32px;
      }
      .tip strong {
        color: rgba(200, 146, 58, 0.8);
      }
      button {
        padding: 13px 28px;
        background: #c8923a;
        color: #05050a;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.02em;
      }
      button:hover {
        background: #d9a24a;
      }
    </style>
  </head>
  <body>
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>
      OneShot needs a connection to load your concepts and sync your progress.
    </p>
    <div class="tip">
      <strong>Good news:</strong> Any quiz you take while connected is saved.
      Your study streak is safe - it syncs the moment you reconnect.
    </div>
    <button onclick="window.location.reload()">Try Again</button>
    <script>
      window.addEventListener("online", () => window.location.reload());
    </script>
  </body>
</html>
